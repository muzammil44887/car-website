<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact My Car Showroom | Get in Touch</title>
    <!-- SEO Meta Description Tag -->
    <meta name="description" content="Have a question or want to schedule a test drive? Contact My Car Showroom today via our form or phone. We're here to help.">
</head>
<body>

    <header>
        <h1>Welcome to My Car Showroom</h1>
        <nav>
            <a href="index.html">Home</a> |
            <a href="about.html">About</a> |
            <a href="cars.html">Cars</a> |
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2>Contact Us</h2>
            <p>Have a question? Fill out the form below and we'll get back to you as soon as possible.</p>
            <form action="#" method="post">
                <div>
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" required>
                </div>
                <div>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div>
                    <label for="phone">Phone Number:</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div>
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <div>
                    <input type="submit" value="Submit">
                </div>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 My Car Showroom. All Rights Reserved.</p>
    </footer>

</body>
</html>
